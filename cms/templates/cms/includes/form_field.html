{% if field.field.widget.input_type == "checkbox" %}
<label class="flex items-center gap-3 rounded-[20px] border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700">
    {{ field }}
    <span>{{ field.label }}</span>
</label>
{% else %}
<div class="min-w-0 max-w-full">
    <label class="mb-2 block text-sm font-semibold text-slate-700" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<p class="mt-2 text-xs leading-5 text-slate-500">{{ field.help_text }}</p>{% endif %}
    {% if field.errors %}<p class="mt-2 text-sm text-red-600">{{ field.errors|join:", " }}</p>{% endif %}
</div>
{% endif %}
