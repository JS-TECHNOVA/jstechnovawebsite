<section class="section-space relative overflow-hidden bg-[linear-gradient(180deg,#f5f8fd_0%,#edf2f9_100%)]">
    <div class="pointer-events-none absolute inset-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_80%_18%,rgba(25,107,255,0.08),transparent_34%)]">
        </div>
    </div>
    <div class="container relative z-10 px-6">
        <div class="grid grid-cols-1 gap-6 lg:grid-cols-12 lg:items-stretch" data-aos="fade-up">
            <div class="lg:col-span-8">
                <div class="divide-y divide-slate-300 border border-slate-300 bg-white/40">
                    {% for item in home_faqs %}
                        <article>
                            <button type="button" data-faq-trigger data-faq-target="faq-answer-{{ forloop.counter }}"
                                class="flex w-full items-center justify-between gap-5 px-5 py-5 text-left md:px-7 md:py-6">
                                <p class="text-lg font-semibold leading-[1.35] text-dark md:text-xl">
                                    <span class="mr-2 text-slate-500">{{ forloop.counter|stringformat:"02d" }}.</span>{{ item.faq.question }}
                                </p>
                                <span data-faq-icon
                                    class="grid h-10 w-10 shrink-0 place-items-center rounded-full border border-slate-300 text-2xl font-semibold leading-none text-dark">{% if forloop.first %}-{% else %}+{% endif %}</span>
                            </button>
                            <div id="faq-answer-{{ forloop.counter }}" class="{% if not forloop.first %}hidden {% endif %}px-5 pb-5 md:px-7 md:pb-6">
                                <p class="max-w-4xl text-sm leading-7 text-slate-700 md:text-base">
                                    {{ item.faq.answer }}
                                </p>
                            </div>
                        </article>
                    {% empty %}
                        <article>
                            <div class="px-5 py-5 text-sm text-slate-600 md:px-7">No FAQs configured yet.</div>
                        </article>
                    {% endfor %}
                </div>
            </div>

            <aside class="h-full lg:col-span-4" data-aos="fade-left" data-aos-delay="120">
                <div class="relative h-full min-h-[520px] overflow-hidden bg-dark">
                    <img src="{{ homepage_content.faqs_side_image_url }}"
                        alt="Frequently asked questions" class="absolute inset-0 h-full w-full object-cover" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-[#03163a]/70 via-[#03163a]/25 to-[#03163a]/80">
                    </div>
                    <div class="absolute left-6 right-6 top-6">
                        <h3 class="text-3xl font-extrabold leading-[1.1] text-white md:text-4xl">
                            {{ homepage_content.faqs_side_title }}
                        </h3>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</section>
