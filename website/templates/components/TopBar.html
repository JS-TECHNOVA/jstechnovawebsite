<!-- top bar -->
<div class="bg-dark text-slate-300 py-3 text-sm hidden lg:block border-b border-slate-800">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <a href="mailto:{{ site_settings.topbar_email }}" class="hover:text-white transition flex items-center gap-2">
                <i class="fa-regular fa-envelope text-accent"></i> {{ site_settings.topbar_email }}
            </a>
            <a href="tel:{{ site_settings.topbar_phone }}" class="hover:text-white transition flex items-center gap-2">
                <i class="fa-solid fa-phone text-accent"></i> {{ site_settings.topbar_phone }}
            </a>
            <span class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot text-accent"></i> {{ site_settings.topbar_location }}
            </span>
        </div>
        <div class="flex items-center space-x-4">
            <span class="mr-2">Follow us:</span>
            {% for social in topbar_social_links %}
                <a href="{{ social.url }}" class="hover:text-accent transition" aria-label="{{ social.label }}"><i class="{{ social.icon_class }}"></i></a>
            {% endfor %}
        </div>
    </div>
</div>
